<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Delta — Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { --navy:#1e3a5f; --teal:#3d8071; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--navy); font-family:"Segoe UI",Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .header { width:100%; background:var(--navy); padding:14px 20px; display:flex; align-items:center; gap:12px; border-bottom:2px solid rgba(255,255,255,.1); }
  .header img { height:32px; background:#fff; border-radius:6px; padding:3px 8px; }
  .header-title { color:#fff; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
  .main { width:100%; max-width:480px; padding:20px 16px; flex:1; display:flex; flex-direction:column; gap:16px; }
  .context-card { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:10px; padding:12px 16px; color:#fff; }
  .context-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:rgba(255,255,255,.55); margin-bottom:4px; }
  .context-value { font-size:15px; font-weight:700; }
  .cam-wrapper { background:#000; border-radius:14px; overflow:hidden; position:relative; width:100%; aspect-ratio:4/3; border:2px solid rgba(255,255,255,.15); }
  #reader { width:100%; height:100%; }
  .aim { position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center; }
  .aim-box { width:220px; height:90px; border:2.5px solid rgba(61,128,113,.9); border-radius:8px; box-shadow:0 0 0 2000px rgba(0,0,0,.35); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{border-color:rgba(61,128,113,.9);}50%{border-color:rgba(61,255,210,.9);} }
  .status { text-align:center; color:rgba(255,255,255,.65); font-size:13px; padding:4px 0; }
  .status.ok { color:#4ade80; font-weight:700; font-size:15px; }
  .status.error { color:#f87171; }
  .result-box { background:#fff; border-radius:12px; padding:16px; display:none; animation:slideUp .3s ease; }
  .result-box.visible { display:block; }
  @keyframes slideUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
  .result-label { font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:#7a8ca0; margin-bottom:6px; }
  .result-value { font-size:24px; font-weight:800; color:var(--navy); letter-spacing:2px; margin-bottom:12px; word-break:break-all; }
  .btn { display:block; width:100%; padding:13px; border:none; border-radius:8px; font-size:16px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; transition:all .15s; font-family:inherit; margin-top:8px; }
  .btn-teal { background:var(--teal); color:#fff; }
  .btn-navy { background:var(--navy); color:#fff; }
  .btn-ghost { background:transparent; border:1.5px solid rgba(255,255,255,.25); color:rgba(255,255,255,.75); }
  .manual-wrap { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:14px; }
  .manual-label { font-size:11px; color:rgba(255,255,255,.55); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
  .manual-row { display:flex; gap:8px; }
  .manual-row input { flex:1; background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.2); color:#fff; padding:10px 12px; border-radius:8px; font-size:16px; font-family:inherit; outline:none; letter-spacing:1px; }
  .manual-row input:focus { border-color:var(--teal); background:rgba(255,255,255,.15); }
  .manual-row input::placeholder { color:rgba(255,255,255,.3); }
  .manual-row button { background:var(--teal); color:#fff; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer; }
</style>
</head>

  <div class="header-title">Scanner de Código de Barras</div>
</div>
<div class="main">
  <div class="context-card">
    <div class="context-label">Escaneando para</div>
    <div class="context-value" id="context-value">—</div>
  </div>
  <div class="cam-wrapper">
    <div id="reader"></div>
    <div class="aim"><div class="aim-box"></div></div>
  </div>
  <div class="status" id="status">Aponte a câmera para o código de barras…</div>
  <div class="result-box" id="result-box">
    <div class="result-label">Código lido</div>
    <div class="result-value" id="result-value">—</div>
    <button class="btn btn-teal" onclick="confirmar()">✔ Usar este código</button>
    <button class="btn btn-navy" onclick="reiniciar()">↺ Escanear novamente</button>
  </div>
  <div class="manual-wrap">
    <div class="manual-label">Ou digite manualmente</div>
    <div class="manual-row">
      <input id="manual-input" type="text" placeholder="Código de barras…" inputmode="numeric"
             onkeypress="if(event.key==='Enter') usarManual()">
      <button onclick="usarManual()">OK</button>
    </div>
  </div>
  <button class="btn btn-ghost" onclick="fechar()">✕ Cancelar e fechar</button>
</div>

<script>
  // Lê parâmetros da URL
  const params  = new URLSearchParams(window.location.search);
  const field   = params.get('field') || 'campo';
  const fieldId = params.get('fieldId') || '';

  document.getElementById('context-value').innerText = field;

  let scanner = null;
  let scanned = '';
  let paused  = false;

  // Inicia câmera
  function initScanner() {
    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 15, qrbox: { width: 260, height: 100 } },
      onScanSuccess,
      function() {}
    ).catch(function() {
      document.getElementById('status').innerText = '⚠️ Câmera bloqueada — use a digitação manual';
      document.getElementById('status').className = 'status error';
    });
  }

  function onScanSuccess(codigo) {
    if (paused) return;
    paused = true;
    scanned = codigo;
    if (navigator.vibrate) navigator.vibrate(120);
    document.getElementById('status').innerText = '✅ Código lido!';
    document.getElementById('status').className = 'status ok';
    document.getElementById('result-value').innerText = codigo;
    document.getElementById('result-box').classList.add('visible');
    if (scanner) scanner.pause(true);
  }

  function confirmar() {
    if (!scanned) return;
    enviar(scanned);
  }

  function usarManual() {
    var v = document.getElementById('manual-input').value.trim();
    if (!v) return;
    enviar(v);
  }

  // ✅ POSTMESSAGE — envia o código para a janela pai sem recarregar o app
  function enviar(codigo) {
    var msg = { type: 'DELTA_BARCODE', codigo: codigo, fieldId: fieldId };

    // Tenta enviar para a janela que abriu este popup
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(msg, '*');
      document.getElementById('status').innerText = '✅ Código enviado para o app!';
      document.getElementById('status').className = 'status ok';
      setTimeout(function() { window.close(); }, 800);
    } else {
      // Fallback: mostra o código para copiar
      document.getElementById('status').innerText = 'Código: ' + codigo + ' — copie e cole no app';
      document.getElementById('status').className = 'status ok';
    }
  }

  function reiniciar() {
    scanned = '';
    paused  = false;
    document.getElementById('result-box').classList.remove('visible');
    document.getElementById('status').innerText = 'Aponte a câmera para o código de barras…';
    document.getElementById('status').className = 'status';
    document.getElementById('manual-input').value = '';
    if (scanner) scanner.resume();
  }

  function fechar() {
    window.close();
  }

  initScanner();
</script>
</body>
</html>
